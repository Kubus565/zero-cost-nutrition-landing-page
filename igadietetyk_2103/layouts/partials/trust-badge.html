<div class="inline-flex items-center gap-3 bg-white px-5 py-2 rounded-full shadow-sm border border-gray-200">
    <div class="flex -space-x-2 ml-2">
        {{/* Pobieramy awatary z globalnego pliku data/reviews.yml */}}
        {{ range first 3 .Site.Data.reviews.items }}
            <img class="w-7 h-7 rounded-full border-2 border-white object-cover" 
                 src="{{ .avatar | relURL }}" 
                 alt="{{ .name }}">
        {{ end }}
    </div>
</div>
